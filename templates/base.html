<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}智慧教学推荐系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <a class="brand" href="{{ url_for('index') }}">
          <p class="eyebrow">Insight Campus</p>
          <h1>智慧教学推荐系统</h1>
          <p class="subtitle">课程运营、资源协同与个性化推荐的统一入口。</p>
        </a>
        <nav class="nav">
          <a href="{{ url_for('index') }}">系统总览</a>
          <a href="{{ url_for('courses') }}">课程中心</a>
          <a href="{{ url_for('assignments') }}">作业中心</a>
          <a href="{{ url_for('resources') }}">资源中心</a>
          <a href="{{ url_for('announcements') }}">通知中心</a>
          <a href="{{ url_for('analytics') }}">学习分析</a>
          <a href="{{ url_for('recommendations') }}">个性化推荐</a>
          <a href="{{ url_for('refresh') }}">刷新平台内容</a>
        </nav>
      </aside>
      <main class="content">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-stack">
              {% for message in messages %}
                <div class="flash">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
